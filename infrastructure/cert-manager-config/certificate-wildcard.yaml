apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-item-fyi
  namespace: traefik-system
spec:
  secretName: wildcard-item-fyi-tls
  issuerRef:
    name: letsencrypt-staging # Switch to letsencrypt-prod after confirming staging works
    kind: ClusterIssuer
  dnsNames:
    - "*.item.fyi"
    - "item.fyi"

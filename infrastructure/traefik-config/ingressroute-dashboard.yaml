apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.item.fyi`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls: {}

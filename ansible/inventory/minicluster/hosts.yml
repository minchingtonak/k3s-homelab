---
all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/k3s_ed25519

  children:
    k3s_servers:
      hosts:
        minicluster-server-01:
          ansible_host: 192.168.20.110
          k3s_cluster_init: true
          data_mount_src: /dev/disk/by-id/nvme-INTEL_SSDPEKNW010T8_PHNH21130GM01P0B
      vars:
        k3s_role: server

    k3s_agents:
      hosts:
        minicluster-agent-01:
          ansible_host: 192.168.20.111
          data_mount_src: /dev/disk/by-id/nvme-INTEL_SSDPEKNW010T8_PHNH21130E3R1P0B
        minicluster-agent-02:
          ansible_host: 192.168.20.112
          data_mount_src: /dev/disk/by-id/nvme-INTEL_SSDPEKNW010T8_PHNH21130BZT1P0B
      vars:
        k3s_role: agent

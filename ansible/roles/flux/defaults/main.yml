---
# flux-operator version. Installed with `helm install` of the operator's OCI chart,
# run from the node over its HOST network (chart pull + image pull are host-level, and
# the release is applied to the local kube-apiserver) — so it works before cluster
# DNS/CoreDNS is up. helm is used instead of `kubectl apply install.yaml` so a real
# Helm release Secret exists, which lets Flux adopt and self-manage the operator in
# steady state via k8s/infrastructure/flux-operator (matching releaseName below).
flux_operator_version: "0.52.0"
flux_operator_namespace: "flux-system"
# OCI chart for the operator. Chart tags track the GitHub release version 1:1.
flux_operator_chart: "oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator"

# helm binary installed on the node for the bootstrap install above. Pinned to the
# v3 line: Flux's helm-controller (and Pulumi's helm.v3 bootstrap on the other
# cluster) use the Helm v3 release-storage format, so the bootstrap release Secret
# must be v3 for clean adoption. https://github.com/helm/helm/releases
flux_helm_version: "v3.21.1"
flux_helm_arch: "amd64"

# Distribution the bootstrap FluxInstance requests. Once Flux syncs the repo, the
# in-repo flux-instance.yaml becomes the source of truth and may override this.
# `artifact` is REQUIRED for flux versions the operator doesn't embed (it fetches
# the distribution manifests from this OCI source) — must match the repo's
# flux-instance.yaml or the operator fails with "no match found for semver".
flux_distribution_version: "2.8.8"
flux_distribution_registry: "ghcr.io/fluxcd"
flux_distribution_artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"

# Git source. Same repo for every cluster; only the path differs per cluster.
flux_git_url: "https://github.com/minchingtonak/k3s-homelab.git"
flux_git_ref: "refs/heads/main"
# REQUIRED per cluster (set in inventory/<cluster>/group_vars), e.g. k8s/clusters/minicluster
flux_cluster_path: ""

# SOPS age PRIVATE key, read from the Ansible control node, installed as the
# `sops-age` secret kustomize-controller uses to decrypt *.sops.yaml at reconcile.
flux_sops_age_key_file: "~/.config/sops/age/keys.txt"

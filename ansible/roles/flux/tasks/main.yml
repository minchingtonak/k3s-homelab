---
- name: Require a cluster sync path
  ansible.builtin.assert:
    that:
      - flux_cluster_path | length > 0
    fail_msg: "flux_cluster_path must be set (e.g. k8s/clusters/minicluster)."

# Install helm on the node so the operator can be installed as a real Helm release
# (see defaults/main.yml for why helm rather than `kubectl apply install.yaml`).
- name: Check installed helm version
  ansible.builtin.command:
    cmd: helm version --short --client
  register: flux_helm_installed
  changed_when: false
  failed_when: false

- name: Install pinned helm binary
  when: flux_helm_version | regex_replace('^v', '') not in (flux_helm_installed.stdout | default(''))
  block:
    - name: Download and extract helm release tarball
      ansible.builtin.unarchive:
        src: "https://get.helm.sh/helm-{{ flux_helm_version }}-linux-{{ flux_helm_arch }}.tar.gz"
        dest: /tmp
        remote_src: true
        creates: "/tmp/linux-{{ flux_helm_arch }}/helm"

    - name: Install helm binary to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/linux-{{ flux_helm_arch }}/helm"
        dest: /usr/local/bin/helm
        remote_src: true
        mode: "0755"

    - name: Remove extracted helm tarball contents
      ansible.builtin.file:
        path: "/tmp/linux-{{ flux_helm_arch }}"
        state: absent

# One-time migration off the original `kubectl apply install.yaml` bootstrap. That
# Deployment's pod selector differs from the Helm chart's, and Deployment.spec.selector
# is immutable, so helm cannot adopt it in place (`--take-ownership` fails patching it).
# When the live Deployment is not yet Helm-managed we therefore: purge any leftover Helm
# release Secret (a failed earlier `helm install` leaves a `failed` release, which makes
# the next `upgrade --install` error with "has no deployed releases"), then delete the
# Deployment so helm recreates it cleanly. Only the Deployment is removed (brief operator
# downtime; the Flux toolkit controllers keep running); CRDs/RBAC/Service are adopted in
# place by `--take-ownership`. No-op on a fresh cluster (nothing exists) and on an
# already-migrated cluster (Deployment is Helm-managed → block is skipped).
- name: Detect whether the flux-operator Deployment is Helm-managed
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      k3s kubectl get deploy flux-operator -n {{ flux_operator_namespace }}
      -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || true
    executable: /bin/bash
  register: flux_operator_managed_by
  changed_when: false

- name: Migrate flux-operator off the kubectl-apply bootstrap
  when: (flux_operator_managed_by.stdout | trim) != "Helm"
  block:
    - name: Purge any leftover (non-deployed) flux-operator Helm release Secret
      ansible.builtin.command:
        cmd: >-
          k3s kubectl delete secret -n {{ flux_operator_namespace }}
          -l owner=helm,name=flux-operator --ignore-not-found
      changed_when: true

    - name: Delete the pre-Helm flux-operator Deployment (immutable selector)
      ansible.builtin.command:
        cmd: >-
          k3s kubectl delete deploy flux-operator -n {{ flux_operator_namespace }}
          --ignore-not-found --wait=true
      changed_when: true

# Install the operator as a Helm release. helm pulls the OCI chart and the operator
# image over the node's host network and applies the release to the local
# kube-apiserver, so this works before cluster CoreDNS is up. Unlike a plain
# `kubectl apply`, this writes a Helm release Secret that Flux's helm-controller
# adopts, letting Flux self-manage the operator afterwards
# (k8s/infrastructure/flux-operator). `--take-ownership` adopts the remaining
# install.yaml resources (CRDs/RBAC/Service) into the new release.
- name: Install flux-operator (namespace + CRDs + controller)
  ansible.builtin.command:
    cmd: >-
      helm upgrade --install flux-operator {{ flux_operator_chart }}
      --version {{ flux_operator_version }}
      --namespace {{ flux_operator_namespace }} --create-namespace
      --take-ownership --wait
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: flux_operator_apply
  changed_when: "'has been upgraded' in flux_operator_apply.stdout or 'has been installed' in flux_operator_apply.stdout"

- name: Wait for the FluxInstance CRD to be established
  ansible.builtin.command:
    cmd: k3s kubectl wait --for=condition=established --timeout=10s crd/fluxinstances.fluxcd.controlplane.io
  register: flux_crd_wait
  until: flux_crd_wait.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Wait for flux-operator to be ready
  ansible.builtin.command:
    cmd: k3s kubectl -n {{ flux_operator_namespace }} rollout status deploy/flux-operator --timeout=30s
  register: flux_operator_ready
  until: flux_operator_ready.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Stage the SOPS age key on the node
  ansible.builtin.copy:
    content: "{{ lookup('file', flux_sops_age_key_file | expanduser) }}"
    dest: /tmp/sops-age.agekey
    mode: "0600"
  no_log: true

- name: Create or update the sops-age secret
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      k3s kubectl create secret generic sops-age -n {{ flux_operator_namespace }}
      --from-file=age.agekey=/tmp/sops-age.agekey
      --dry-run=client -o yaml | k3s kubectl apply -f -
    executable: /bin/bash
  register: flux_sops_secret
  changed_when: "'configured' in flux_sops_secret.stdout or 'created' in flux_sops_secret.stdout"
  no_log: true

- name: Remove the staged age key
  ansible.builtin.file:
    path: /tmp/sops-age.agekey
    state: absent

- name: Check whether the FluxInstance already exists
  ansible.builtin.command:
    cmd: k3s kubectl get fluxinstance flux -n {{ flux_operator_namespace }}
  register: flux_instance_check
  changed_when: false
  failed_when: false

# Apply the bootstrap FluxInstance only if absent — once it exists, Flux's
# kustomize-controller owns its spec (reconciled from the repo). Re-applying would
# fight that ownership.
- name: Render the bootstrap FluxInstance
  ansible.builtin.template:
    src: flux-instance.yaml.j2
    dest: /tmp/flux-instance.yaml
    mode: "0644"
  when: flux_instance_check.rc != 0

- name: Apply the bootstrap FluxInstance
  ansible.builtin.command:
    cmd: k3s kubectl apply -f /tmp/flux-instance.yaml
  when: flux_instance_check.rc != 0
  changed_when: true

- name: Remove the rendered FluxInstance manifest
  ansible.builtin.file:
    path: /tmp/flux-instance.yaml
    state: absent
  when: flux_instance_check.rc != 0

[defaults]
# No default inventory on purpose — always pass -i inventory/<cluster> so a run
# can never target the wrong cluster by accident.
roles_path = roles
collections_path = ../.ansible
host_key_checking = False
retry_files_enabled = False
# host_group_vars MUST stay enabled or normal group_vars/host_vars loading breaks.
# community.sops.sops transparently decrypts *.sops.yml / *.sops.yaml vars files.
vars_plugins_enabled = host_group_vars,community.sops.sops

# No privilege escalation: Ansible connects as root (see inventory ansible_user).
# A minimal Debian install may not have sudo until the common role installs it,
# so do NOT rely on become. If you switch to a non-root sudo user, re-enable
# become here and ensure sudo is present for the first connection.
[privilege_escalation]
become = False

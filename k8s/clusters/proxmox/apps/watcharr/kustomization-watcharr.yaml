apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: watcharr
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: cert-manager
    - name: nfs-provisioner
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/apps/watcharr
  prune: true
  wait: true
  timeout: 5m

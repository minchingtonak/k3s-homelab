apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: cert-manager
    - name: sealed-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/infrastructure/cert-manager-config
  prune: true
  timeout: 5m

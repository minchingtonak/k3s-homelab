apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: traefik
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/infrastructure/traefik-config
  prune: true
  wait: true
  timeout: 5m

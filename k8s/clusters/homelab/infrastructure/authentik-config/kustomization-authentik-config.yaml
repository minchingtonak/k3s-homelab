apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: authentik
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/infrastructure/authentik-config
  prune: true
  wait: true
  timeout: 2m

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: traefik
    - name: sealed-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/infrastructure/external-dns
  prune: true
  wait: true
  timeout: 5m

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: nfs-provisioner
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/infrastructure/loki
  prune: true
  wait: true
  timeout: 5m

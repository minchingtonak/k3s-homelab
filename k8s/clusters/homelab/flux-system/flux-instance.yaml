# https://fluxoperator.dev/docs/crd/fluxinstance
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: 'enabled'
    fluxcd.controlplane.io/reconcileEvery: '1h'
    fluxcd.controlplane.io/reconcileArtifactEvery: '10m'
    fluxcd.controlplane.io/reconcileTimeout: '5m'
spec:
  distribution:
    version: '2.8.6'
    registry: 'ghcr.io/fluxcd'
    artifact: 'oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests'
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  kustomize:
    patches:
      - target:
          kind: Service
          name: source-controller
        patch: |
          - op: add
            path: /metadata/annotations/gatus.home-operations.com~1enabled
            value: "false"
  cluster:
    type: kubernetes
    size: small
    domain: 'cluster.local'
  sync:
    kind: GitRepository
    url: 'https://github.com/minchingtonak/k3s-homelab.git'
    ref: 'refs/heads/main'
    # If this path ever changes (e.g. repo restructure), patch the in-cluster
    # FluxInstance manually — Flux can't self-bootstrap to a new path.
    # See docs/runbook-flux-path-migration.md
    path: 'k8s/clusters/homelab'

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: cert-manager
    - name: nfs-provisioner
    - name: sealed-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/apps/forgejo
  prune: true
  wait: true
  timeout: 5m

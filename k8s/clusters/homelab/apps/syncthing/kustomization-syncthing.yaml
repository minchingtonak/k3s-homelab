apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: syncthing
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: cert-manager
    - name: nfs-provisioner
    - name: authentik-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/apps/syncthing
  prune: true
  wait: true
  timeout: 5m

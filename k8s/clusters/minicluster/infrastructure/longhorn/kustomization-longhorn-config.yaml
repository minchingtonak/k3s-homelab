apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: longhorn
    - name: cert-manager
    - name: authentik-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/infrastructure/longhorn-config
  prune: true
  timeout: 2m

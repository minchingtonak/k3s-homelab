apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: traefik
    - name: longhorn
    - name: authentik-vars
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: k8s/infrastructure/authentik
  prune: true
  wait: true
  timeout: 10m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: authentik-vars

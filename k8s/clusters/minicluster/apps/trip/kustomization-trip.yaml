apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trip
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  dependsOn:
    - name: cert-manager
    - name: authentik-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: k8s/apps/trip
  prune: true
  wait: true
  timeout: 5m

apiVersion: v1
kind: Namespace
metadata:
  name: docuseal
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docuseal-data
  namespace: docuseal
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docuseal-postgres
  namespace: docuseal
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuseal-postgres
  namespace: docuseal
  labels:
    app.kubernetes.io/name: docuseal-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: docuseal-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docuseal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15@sha256:3b0d656f5fff31c7d8a64f500a703dcf3f35e98ce78f602831a73059a5e6a012
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: docuseal
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: docuseal-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: docuseal-postgres
  namespace: docuseal
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: docuseal-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuseal
  namespace: docuseal
  labels:
    app.kubernetes.io/name: docuseal
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: docuseal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docuseal
    spec:
      containers:
        - name: docuseal
          image: docuseal/docuseal:3.1.2@sha256:b585c37656c1e85ead752f8597e1149caf666894f50d7a91e49881cceb5562de
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: FORCE_SSL
              value: "docuseal.item.fyi"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@docuseal-postgres:5432/docuseal"
          volumeMounts:
            - name: data
              mountPath: /data/docuseal
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docuseal-data
---
apiVersion: v1
kind: Service
metadata:
  name: docuseal
  namespace: docuseal
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: docuseal
  ports:
    - port: 80
      targetPort: 3000
      name: http

apiVersion: v1
kind: Namespace
metadata:
  name: newt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: newt
  namespace: newt
  labels:
    app.kubernetes.io/name: newt
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: newt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: newt
    spec:
      containers:
        - name: newt
          image: fosrl/newt:1.13.0@sha256:63d956c8fdee889255e441ec405193b47b1fd2d975b505492ec848a8007f4fc3
          env:
            - name: PANGOLIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: newt
                  key: PANGOLIN_ENDPOINT
            - name: NEWT_ID
              valueFrom:
                secretKeyRef:
                  name: newt
                  key: NEWT_ID
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newt
                  key: NEWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"

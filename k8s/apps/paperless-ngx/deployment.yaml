---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx-tika
  namespace: paperless-ngx
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx-tika
  ports:
    - port: 9998
      targetPort: 9998
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx
      annotations:
        secret.reloader.stakater.com/reload: paperless-ngx
    spec:
      containers:
        - name: paperless-ngx
          image: ghcr.io/paperless-ngx/paperless-ngx:2.20.14@sha256:b89f83345532cfba72690185257eb6c4f92fc2a782332a42abe19c07b7a6595f
          # paperless will chown the media volume to USERMAP_UID:USERMAP_GID on startup
          env:
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GID
              value: "110000"
            - name: PAPERLESS_APPS
              value: allauth.socialaccount.providers.openid_connect
            - name: PAPERLESS_SOCIALACCOUNT_PROVIDERS
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx
                  key: PAPERLESS_SOCIALACCOUNT_PROVIDERS
            - name: PAPERLESS_APP_TITLE
              value: paperless-ngx
            - name: PAPERLESS_URL
              value: https://paperless.item.fyi
            - name: PAPERLESS_REDIS
              value: redis://paperless-ngx-redis:6379
            - name: PAPERLESS_DBHOST
              value: paperless-ngx-postgres
            - name: PAPERLESS_DBUSER
              value: paperless
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx
                  key: PAPERLESS_DBPASS
            - name: PAPERLESS_TIME_ZONE
              value: America/New_York
            - name: PAPERLESS_CONSUMPTION_DIR
              value: /usr/src/paperless/consume
            - name: PAPERLESS_CONSUMER_RECURSIVE
              value: "true"
            - name: PAPERLESS_DATA_DIR
              value: /usr/src/paperless/data
            - name: PAPERLESS_EMPTY_TRASH_DELAY
              value: "7"
            - name: PAPERLESS_MEDIA_ROOT
              value: /usr/src/paperless/media
            - name: PAPERLESS_FILENAME_FORMAT
              value: "{% filter replace(\" \", \"\") %}{{ custom_fields.Category.value }}/{{ correspondent }}/{{ created }}_{{ title }}{% endfilter %}"
            - name: PAPERLESS_FILENAME_FORMAT_REMOVE_NONE
              value: "false"
            - name: PAPERLESS_FILENAME_DATE_ORDER
              value: YMD
            - name: PAPERLESS_LOGGING_DIR
              value: /usr/src/paperless/data/log
            - name: PAPERLESS_OCR_CLEAN
              value: clean
            - name: PAPERLESS_OCR_DESKEW
              value: "true"
            - name: PAPERLESS_OCR_ROTATE_PAGES
              value: "true"
            - name: PAPERLESS_OCR_OUTPUT_TYPE
              value: pdfa
            - name: PAPERLESS_DATE_ORDER
              value: MDY
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx
                  key: PAPERLESS_ADMIN_USER
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx
                  key: PAPERLESS_ADMIN_PASSWORD
            - name: PAPERLESS_WEBSERVER_WORKERS
              value: "2"
            - name: PAPERLESS_TIKA_ENABLED
              value: "1"
            - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
              value: http://paperless-ngx-gotenberg:3000
            - name: PAPERLESS_TIKA_ENDPOINT
              value: http://paperless-ngx-tika:9998
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-ngx-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-ngx-media
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-ngx-consume
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx
  ports:
    - port: 80
      targetPort: 8000
      name: http

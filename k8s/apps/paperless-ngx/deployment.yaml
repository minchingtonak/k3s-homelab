apiVersion: v1
kind: Namespace
metadata:
  name: paperless-ngx
---
# Dynamic PVCs — managed by nfs-zfs provisioner
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-postgres
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-redis
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-data
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 4Gi
---
# Static PV/PVC pairs — direct NFS mounts to existing Proxmox paths on void pool
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-ngx-media
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: paperless-ngx-media
    namespace: paperless-ngx
  nfs:
    server: 192.168.8.89
    path: /void/documents/paperless
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-media
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: paperless-ngx-media
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-ngx-consume
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: paperless-ngx-consume
    namespace: paperless-ngx
  nfs:
    server: 192.168.8.89
    path: /void/documents/intake
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-consume
  namespace: paperless-ngx
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: paperless-ngx-consume
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx-postgres
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx-postgres
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:16@sha256:fd4208c8aadb92850e7e86a584fe8b1f2a6af8949feeb1ac8e12e72324573676
          env:
            - name: POSTGRES_DB
              value: paperless
            - name: POSTGRES_USER
              value: paperless
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx
                  key: PAPERLESS_DBPASS
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "paperless", "-d", "paperless"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: shared-mem
              mountPath: /dev/shm
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: paperless-ngx-postgres
        - name: shared-mem
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx-postgres
  namespace: paperless-ngx
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx-redis
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx-redis
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7@sha256:4a36f83c7f44b96953a7691b949ec77d8b96723623dd0b984c63d8615accb99c
          command: ["redis-server"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: paperless-ngx-redis
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx-redis
  namespace: paperless-ngx
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx-gotenberg
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx-gotenberg
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx-gotenberg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx-gotenberg
    spec:
      containers:
        - name: gotenberg
          # pinned
          image: docker.io/gotenberg/gotenberg:8.27@sha256:d71ab8c13b6bd47c7bc81195082005dfb17eaa75e8b1fadd347a64ee66ed98d5
          command:
            - gotenberg
            - --api-timeout=600s
            - --chromium-disable-javascript=true
            - --chromium-allow-list=file:///tmp/.*
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-ngx-gotenberg
  namespace: paperless-ngx
spec:
  selector:
    app.kubernetes.io/name: paperless-ngx-gotenberg
  ports:
    - port: 3000
      targetPort: 3000
      name: http
---

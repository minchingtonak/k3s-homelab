---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: homepage-secrets
  namespace: homepage
spec:
  encryptedData:
    HOMEPAGE_VAR_AUTHENTIK_TOKEN: 
    HOMEPAGE_VAR_FORGEJO_TOKEN: 
    HOMEPAGE_VAR_GRAFANA_PASSWORD: 
    HOMEPAGE_VAR_GRAFANA_USERNAME: 
    HOMEPAGE_VAR_PAPERLESS_TOKEN: 
    HOMEPAGE_VAR_SYNCTHING_API_KEY: 
    HOMEPAGE_VAR_TANDOOR_TOKEN: 
  template:
    metadata:
      name: homepage-secrets
      namespace: homepage
    type: Opaque

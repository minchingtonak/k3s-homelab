apiVersion: v1
kind: Namespace
metadata:
  name: forgejo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-postgres
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-postgres
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-postgres
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:16@sha256:fd4208c8aadb92850e7e86a584fe8b1f2a6af8949feeb1ac8e12e72324573676
          env:
            - name: POSTGRES_DB
              value: forgejo
            - name: POSTGRES_USER
              value: forgejo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__database__PASSWD
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "forgejo", "-d", "forgejo"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: shared-mem
              mountPath: /dev/shm
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: forgejo-postgres
        - name: shared-mem
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-postgres
  namespace: forgejo
spec:
  selector:
    app.kubernetes.io/name: forgejo-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
      annotations:
        secret.reloader.stakater.com/reload: forgejo
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: configure-oauth
          image: codeberg.org/forgejo/forgejo:14.0.4@sha256:f33e1b5087b7dc3bdbb60ceb0e6f32bf0ce06376328d17c7db86fba62b673f6f
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              # generate app.ini from env vars so forgejo CLI can connect to DB
              mkdir -p /data/gitea/conf
              environment-to-ini -o /data/gitea/conf/app.ini

              # wait for postgres
              until nc -z forgejo-postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done

              # ensure DB schema is up to date
              forgejo migrate

              # upsert oauth source
              AUTH_ID=$(forgejo admin auth list --vertical-bars 2>/dev/null \
                | awk -F'|' 'tolower($3) ~ /oauth2/ && tolower($2) ~ /authentik/ {gsub(/[[:space:]]/,"",$1); print $1}' \
                | head -1)

              if [ -z "$AUTH_ID" ]; then
                echo "creating authentik oauth source"
                forgejo admin auth add-oauth \
                  --name "authentik" \
                  --provider openidConnect \
                  --key "$OAUTH_CLIENT_ID" \
                  --secret "$OAUTH_CLIENT_SECRET" \
                  --auto-discover-url "https://auth.item.fyi/application/o/forgejo/.well-known/openid-configuration" \
                  --scopes "openid email profile" \
                  --skip-local-2fa
              else
                echo "updating authentik oauth source (id=$AUTH_ID)"
                forgejo admin auth update-oauth --id "$AUTH_ID" \
                  --name "authentik" \
                  --provider openidConnect \
                  --key "$OAUTH_CLIENT_ID" \
                  --secret "$OAUTH_CLIENT_SECRET" \
                  --auto-discover-url "https://auth.item.fyi/application/o/forgejo/.well-known/openid-configuration" \
                  --scopes "openid email profile" \
                  --skip-local-2fa
              fi
          env:
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-postgres:5432
            - name: FORGEJO__database__NAME
              value: forgejo
            - name: FORGEJO__database__USER
              value: forgejo
            - name: FORGEJO__database__SSL_MODE
              value: disable
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__database__PASSWD
            - name: FORGEJO__server__APP_DATA_PATH
              value: /data/gitea
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: OAUTH_CLIENT_ID
              value: forgejo
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: OAUTH_CLIENT_SECRET
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:14.0.4@sha256:f33e1b5087b7dc3bdbb60ceb0e6f32bf0ce06376328d17c7db86fba62b673f6f
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            # database
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-postgres:5432
            - name: FORGEJO__database__NAME
              value: forgejo
            - name: FORGEJO__database__USER
              value: forgejo
            - name: FORGEJO__database__LOG_SQL
              value: "false"
            - name: FORGEJO__database__SSL_MODE
              value: disable
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__database__PASSWD
            # server
            - name: FORGEJO__server__DOMAIN
              value: forgejo.item.fyi
            - name: FORGEJO__server__SSH_DOMAIN
              value: forgejo.item.fyi
            - name: FORGEJO__server__HTTP_PORT
              value: "3000"
            - name: FORGEJO__server__ROOT_URL
              value: https://forgejo.item.fyi/
            - name: FORGEJO__server__DISABLE_SSH
              value: "false"
            - name: FORGEJO__server__SSH_PORT
              value: "22"
            - name: FORGEJO__server__SSH_LISTEN_PORT
              value: "22"
            - name: FORGEJO__server__LFS_START_SERVER
              value: "true"
            - name: FORGEJO__server__OFFLINE_MODE
              value: "true"
            - name: FORGEJO__server__APP_DATA_PATH
              value: /data/gitea
            - name: FORGEJO__server__LFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__server__LFS_JWT_SECRET
            # security
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__security__REVERSE_PROXY_LIMIT
              value: "1"
            - name: FORGEJO__security__REVERSE_PROXY_TRUSTED_PROXIES
              value: "*"
            - name: FORGEJO__security__PASSWORD_HASH_ALGO
              value: pbkdf2_hi
            - name: FORGEJO__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__security__INTERNAL_TOKEN
            - name: FORGEJO__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__security__SECRET_KEY
            # service
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "true"
            - name: FORGEJO__service__REQUIRE_SIGNIN_VIEW
              value: "false"
            - name: FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION
              value: "false"
            - name: FORGEJO__service__ENABLE_CAPTCHA
              value: "false"
            - name: FORGEJO__service__DEFAULT_KEEP_EMAIL_PRIVATE
              value: "false"
            - name: FORGEJO__service__DEFAULT_ALLOW_CREATE_ORGANIZATION
              value: "true"
            - name: FORGEJO__service__DEFAULT_ENABLE_TIMETRACKING
              value: "true"
            - name: FORGEJO__service__NO_REPLY_ADDRESS
              value: noreply.localhost
            # repository
            - name: FORGEJO__repository__ROOT
              value: /data/git/repositories
            # lfs
            - name: FORGEJO__lfs__PATH
              value: /data/git/lfs
            # session
            - name: FORGEJO__session__PROVIDER
              value: file
            - name: FORGEJO__session__PROVIDER_CONFIG
              value: /data/gitea/sessions
            # log
            - name: FORGEJO__log__MODE
              value: console
            - name: FORGEJO__log__LEVEL
              value: info
            - name: FORGEJO__log__ROOT_PATH
              value: /data/gitea/log
            # attachment
            - name: FORGEJO__attachment__PATH
              value: /data/gitea/attachments
            # picture
            - name: FORGEJO__picture__AVATAR_UPLOAD_PATH
              value: /data/gitea/avatars
            - name: FORGEJO__picture__REPOSITORY_AVATAR_UPLOAD_PATH
              value: /data/gitea/repo-avatars
            # indexer
            - name: FORGEJO__indexer__ISSUE_INDEXER_PATH
              value: /data/gitea/indexers/issues.bleve
            # mailer
            - name: FORGEJO__mailer__ENABLED
              value: "false"
            # oauth2
            - name: FORGEJO__oauth2__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo
                  key: FORGEJO__oauth2__JWT_SECRET
            # openid
            - name: FORGEJO__openid__ENABLE_OPENID_SIGNIN
              value: "true"
            - name: FORGEJO__openid__ENABLE_OPENID_SIGNUP
              value: "true"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1536Mi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
spec:
  selector:
    app.kubernetes.io/name: forgejo
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-ssh
  namespace: forgejo
spec:
  selector:
    app.kubernetes.io/name: forgejo
  ports:
    - port: 22
      targetPort: 22
      name: ssh

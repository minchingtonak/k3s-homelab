apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forgejo
  namespace: forgejo
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Forgejo"
    gethomepage.dev/description: "Git forge"
    gethomepage.dev/group: "Development"
    gethomepage.dev/icon: "forgejo.png"
    gethomepage.dev/href: "https://forgejo.item.fyi"
    gethomepage.dev/siteMonitor: "https://forgejo.item.fyi"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=forgejo"
    gethomepage.dev/widget.type: "gitea"
    gethomepage.dev/widget.url: "http://forgejo.forgejo.svc.cluster.local"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_FORGEJO_TOKEN}}"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`forgejo.item.fyi`)
      services:
        - name: forgejo
          port: 80
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: forgejo-ssh
  namespace: forgejo
spec:
  entryPoints:
    - ssh
  routes:
    - match: HostSNI(`*`)
      services:
        - name: forgejo-ssh
          port: 22

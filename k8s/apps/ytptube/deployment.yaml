apiVersion: v1
kind: Namespace
metadata:
  name: ytptube
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ytptube-config
  namespace: ytptube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ytptube-downloads
  namespace: ytptube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ytptube
  namespace: ytptube
  labels:
    app.kubernetes.io/name: ytptube
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ytptube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ytptube
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: ytptube
          image: ghcr.io/arabcoders/ytptube:v2.5.6@sha256:f1a5c5d08f496853c7d6d7580c6cbab1d0e607053966b4752194967bc3c4f7ee
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: ytptube-config
        - name: downloads
          persistentVolumeClaim:
            claimName: ytptube-downloads
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ytptube
  namespace: ytptube
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: ytptube
  ports:
    - port: 80
      targetPort: 8081
      name: http

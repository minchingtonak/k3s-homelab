apiVersion: v1
kind: Namespace
metadata:
  name: ytptube
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ytptube-config
  namespace: ytptube
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ytptube-downloads
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: ytptube-downloads
    namespace: ytptube
  nfs:
    server: 192.168.20.89
    path: /void/media/downloads/ytptube
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ytptube-downloads
  namespace: ytptube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: ytptube-downloads
  resources:
    requests:
      storage: 500Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ytptube
  namespace: ytptube
  labels:
    app.kubernetes.io/name: ytptube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ytptube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ytptube
    spec:
      securityContext:
        runAsUser: 100000
        runAsGroup: 100000
        fsGroup: 100000
      containers:
        - name: ytptube
          image: ghcr.io/arabcoders/ytptube:v2.5.10@sha256:453e5682f6698cdf2adad66c5aa8c08efa0b9d8480e4ec9f62da55a242af3a08
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "768Mi"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: ytptube-config
        - name: downloads
          persistentVolumeClaim:
            claimName: ytptube-downloads
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ytptube
  namespace: ytptube
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: ytptube
  ports:
    - port: 80
      targetPort: 8081
      name: http

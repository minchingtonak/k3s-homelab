apiVersion: v1
kind: Namespace
metadata:
  name: stirling-pdf
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stirling-pdf-data
  namespace: stirling-pdf
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
  labels:
    app.kubernetes.io/name: stirling-pdf
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stirling-pdf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stirling-pdf
    spec:
      containers:
        - name: stirling-pdf
          image: stirlingtools/stirling-pdf:2.9.2@sha256:3fcfa4d6b6ff22fdbf96ff2aae98dc2fb6d8c1ba0afab1dd2fdfdcdc9ab543c4
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DOCKER_ENABLE_SECURITY
              value: "false"
            - name: LANGS
              value: "en_US"
          volumeMounts:
            - name: data
              mountPath: /configs
              subPath: configs
            - name: data
              mountPath: /customFiles
              subPath: customFiles
            - name: data
              mountPath: /pipeline
              subPath: pipeline
            - name: tessdata
              mountPath: /usr/share/tessdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stirling-pdf-data
        - name: tessdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: stirling-pdf
spec:
  selector:
    app.kubernetes.io/name: stirling-pdf
  ports:
    - port: 80
      targetPort: 8080
      name: http

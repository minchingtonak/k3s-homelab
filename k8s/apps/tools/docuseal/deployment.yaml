apiVersion: v1
kind: Namespace
metadata:
  name: docuseal
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docuseal-data
  namespace: docuseal
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docuseal-postgres
  namespace: docuseal
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuseal-postgres
  namespace: docuseal
  labels:
    app.kubernetes.io/name: docuseal-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docuseal-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docuseal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15@sha256:08155957f670000953ad9bf7f654a13bb0d4fb01b8f1cc83736f2fd18601aab4
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: docuseal
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: docuseal-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: docuseal-postgres
  namespace: docuseal
spec:
  selector:
    app.kubernetes.io/name: docuseal-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuseal
  namespace: docuseal
  labels:
    app.kubernetes.io/name: docuseal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docuseal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docuseal
    spec:
      containers:
        - name: docuseal
          image: docuseal/docuseal:2.5.0@sha256:79e89341233352ac73dea757be97ee451baca786aa42eefe4538b16e1a92cf01
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: FORCE_SSL
              value: "docuseal.item.fyi"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@docuseal-postgres:5432/docuseal"
          volumeMounts:
            - name: data
              mountPath: /data/docuseal
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: docuseal-data
---
apiVersion: v1
kind: Service
metadata:
  name: docuseal
  namespace: docuseal
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: docuseal
  ports:
    - port: 80
      targetPort: 3000
      name: http

apiVersion: v1
kind: Namespace
metadata:
  name: mazanoke
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mazanoke
  namespace: mazanoke
  labels:
    app.kubernetes.io/name: mazanoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mazanoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mazanoke
    spec:
      containers:
        - name: mazanoke
          image: ghcr.io/civilblur/mazanoke:v1.1.5@sha256:e43dc48de575b7a032bbefd96b890d69c1f141417e43d5d096469aa1398711d6
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mazanoke
  namespace: mazanoke
spec:
  selector:
    app.kubernetes.io/name: mazanoke
  ports:
    - port: 80
      targetPort: 80
      name: http

apiVersion: v1
kind: Namespace
metadata:
  name: audiomuse
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiomuse-postgres
  namespace: audiomuse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiomuse-redis
  namespace: audiomuse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: audiomuse-config
  namespace: audiomuse
data:
  TZ: America/New_York
  POSTGRES_HOST: audiomuse-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: audiomuse
  POSTGRES_USER: audiomuse
  REDIS_URL: redis://audiomuse-redis:6379/0
  MEDIASERVER_TYPE: navidrome
  NAVIDROME_URL: http://navidrome.navidrome.svc.cluster.local:4533
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiomuse-postgres
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: audiomuse-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine@sha256:cd17e2ac98240fce1541ad2a803b34009b4eea5aec8a832363cdc7eca62e722e
          env:
            - name: POSTGRES_USER
              value: audiomuse
            - name: POSTGRES_DB
              value: audiomuse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: audiomuse
                  key: POSTGRES_PASSWORD
            # PGDATA in a subdir so the ext4 lost+found at the Longhorn volume
            # root doesn't make initdb fail ("directory exists but is not empty").
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "audiomuse", "-d", "audiomuse"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: shared-mem
              mountPath: /dev/shm
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: audiomuse-postgres
        - name: shared-mem
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: audiomuse-postgres
  namespace: audiomuse
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: audiomuse-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiomuse-redis
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: audiomuse-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
          command: ["redis-server"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: audiomuse-redis
---
apiVersion: v1
kind: Service
metadata:
  name: audiomuse-redis
  namespace: audiomuse
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: audiomuse-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiomuse-flask
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: audiomuse-flask
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-flask
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-flask
    spec:
      containers:
        - name: audiomuse
          image: ghcr.io/neptunehub/audiomuse-ai:2.5.0@sha256:f7f9f96d5ef71a6e0a87c5beaafa66c0cb07319af7a13fad384caccaff133236
          env:
            - name: SERVICE_TYPE
              value: flask
          envFrom:
            - configMapRef:
                name: audiomuse-config
            - secretRef:
                name: audiomuse
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: temp-audio
              mountPath: /app/temp_audio
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "6Gi"
      volumes:
        - name: temp-audio
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: audiomuse
  namespace: audiomuse
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: audiomuse-flask
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: audiomuse-worker
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: audiomuse-worker
  annotations:
    # watch both the referenced ConfigMap (audiomuse-config) and Secret (audiomuse)
    # so env changes to either trigger a rollout — envFrom is only read at pod start.
    reloader.stakater.com/auto: "true"
spec:
  # DaemonSet: one worker pod per node so analysis fans out across the whole
  # cluster's CPU; new nodes automatically get a worker. RollingUpdate replaces
  # one pod at a time on changes (maxUnavailable defaults to 1).
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: audiomuse-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiomuse-worker
    spec:
      containers:
        - name: audiomuse
          image: ghcr.io/neptunehub/audiomuse-ai:2.5.0@sha256:f7f9f96d5ef71a6e0a87c5beaafa66c0cb07319af7a13fad384caccaff133236
          env:
            - name: SERVICE_TYPE
              value: worker
          envFrom:
            - configMapRef:
                name: audiomuse-config
            - secretRef:
                name: audiomuse
          volumeMounts:
            - name: temp-audio
              mountPath: /app/temp_audio
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              # analysis (librosa/CLAP) is CPU- and memory-heavy; give the worker
              # headroom so it isn't OOM-killed mid-track.
              memory: "12Gi"
      volumes:
        - name: temp-audio
          emptyDir: {}

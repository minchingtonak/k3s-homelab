apiVersion: v1
kind: Namespace
metadata:
  name: wallos
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wallos-data
  namespace: wallos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallos
  namespace: wallos
  labels:
    app.kubernetes.io/name: wallos
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wallos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallos
    spec:
      containers:
        - name: wallos
          image: bellamy/wallos:4.9.6@sha256:3b2cdc843b4b1920220ce26a5804208eab8c236c60d4c777c6223c181f837be1
          env:
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/www/html/db
              subPath: db
            - name: data
              mountPath: /var/www/html/images/uploads/logos
              subPath: logos
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wallos-data
---
apiVersion: v1
kind: Service
metadata:
  name: wallos
  namespace: wallos
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: wallos
  ports:
    - port: 80
      targetPort: 80
      name: http

apiVersion: v1
kind: Namespace
metadata:
  name: seerr
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config
  namespace: seerr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: seerr
  labels:
    app: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
          ports:
            - containerPort: 5055
              name: http
          env:
            - name: LOG_LEVEL
              value: 'debug'
            - name: TZ
              value: 'America/New_York' # Adjust to your timezone
            - name: PORT
              value: '5055'
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '1Gi'
              cpu: '1000m'
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config
---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: seerr
spec:
  selector:
    app: seerr
  ports:
    - port: 80
      targetPort: 5055
      name: http

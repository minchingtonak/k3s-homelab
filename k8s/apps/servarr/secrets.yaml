# servarr-config-vars holds only the secret VALUES that get substituted into
# plaintext ConfigMaps in this directory by Flux postBuild.substituteFrom.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: servarr-config-vars
  namespace: servarr
spec:
  encryptedData:
    SECRET_SLSKD_API_KEY: 
    SECRET_SLSKD_PASSWORD: 
    SECRET_SLSKD_USERNAME: 
    SECRET_SOULSEEK_PASSWORD: 
    SECRET_SOULSEEK_USER: 
  template:
    metadata:
      name: servarr-config-vars
      namespace: servarr
    type: Opaque

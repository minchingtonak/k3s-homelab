apiVersion: v1
kind: ConfigMap
metadata:
  name: slskd-config
  namespace: servarr
data:
  slskd.yml: "directories:\n  incomplete: /data/downloads/slskd/incomplete\n  downloads:\
    \ /data/downloads/slskd/complete\nweb:\n  port: 5030\n  https:\n    disabled:\
    \ true\n  url_base: /\n  logging: false\n  authentication:\n    disabled: true\n\
    \    username: ${SECRET_SLSKD_USERNAME}\n    password: ${SECRET_SLSKD_PASSWORD}\n\
    \    jwt:\n      key: ~\n      ttl: 604800000\n    api_keys:\n      homepage_widget:\n\
    \        key: ${SECRET_SLSKD_API_KEY}\n        role: readonly\n        cidr: 0.0.0.0/0,::0\n\
    soulseek:\n  address: vps.slsknet.org\n  port: 2416\n  username: ${SECRET_SOULSEEK_USER}\n\
    \  password: ${SECRET_SOULSEEK_PASSWORD}\n  description: |\n    A slskd user.\
    \ https://github.com/slskd/slskd\n  listen_ip_address: 0.0.0.0\n  listen_port:\
    \ 50300\n  diagnostic_level: Info\n  distributed_network:\n    disabled: false\n\
    \    disable_children: false\n    child_limit: 25\n    logging: false\n  connection:\n\
    \    timeout:\n      connect: 10000\n      inactivity: 15000\n      transfer:\
    \ 60000\n    buffer:\n      read: 16384\n      write: 16384\n      transfer: 262144\n\
    \      write_queue: 250\n"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: triggarr-config
  namespace: servarr
data:
  triggarr.toml: '[general]

    log_level = "info"

    hard_max_per_cycle = 0

    max_history_rows = 0

    request_timeout = 60

    page_size = 50

    tracking_window_minutes = 60

    tracking_delay_seconds = 90

    skip_unreleased = true


    [auth]

    method = "Disabled"


    [radarr.Default]

    url = "http://radarr.servarr.svc.cluster.local:7878"

    api_key = "${SECRET_RADARR_API_KEY}"

    enabled = true

    search_interval = 30

    search_missing_count = 2

    search_cutoff_count = 1


    [sonarr.Default]

    url = "http://sonarr.servarr.svc.cluster.local:8989"

    api_key = "${SECRET_SONARR_API_KEY}"

    enabled = true

    search_interval = 30

    search_missing_count = 2

    search_cutoff_count = 1

    '
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apprise-config
  namespace: servarr
data:
  homelab.yml: "tag:\n  - homelab\n\nurls:\n  - \"${SECRET_SERVARR_SLACK_WEBHOOK}\"\
    :\n      - tag: servarr\n  - \"pover://${SECRET_PUSHOVER_RADARR_TOKEN}@${SECRET_USER_TOKEN}?priority=normal\"\
    :\n      - tag: radarr\n  - \"pover://${SECRET_PUSHOVER_SONARR_TOKEN}@${SECRET_USER_TOKEN}?priority=normal\"\
    :\n      - tag: sonarr\n  - \"pover://${SECRET_PUSHOVER_LIDARR_TOKEN}@${SECRET_USER_TOKEN}?priority=normal\"\
    :\n      - tag: lidarr\n  - \"pover://${SECRET_PUSHOVER_BAZARR_TOKEN}@${SECRET_USER_TOKEN}?priority=normal\"\
    :\n      - tag: bazarr\n  - \"pover://${SECRET_PUSHOVER_HUNTARR_TOKEN}@${SECRET_USER_TOKEN}?priority=normal\"\
    :\n      - tag: huntarr\n  - \"pover://${SECRET_PUSHOVER_CLEANUPARR_TOKEN}@${SECRET_USER_TOKEN}?priority=normal\"\
    :\n      - tag: cleanuparr\n"

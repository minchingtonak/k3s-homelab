---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cleanuparr-config
  namespace: servarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanuparr
  namespace: servarr
  labels:
    app.kubernetes.io/name: cleanuparr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cleanuparr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cleanuparr
    spec:
      securityContext:
        fsGroup: 100000
      containers:
        - name: cleanuparr
          image: ghcr.io/cleanuparr/cleanuparr:2.9.14@sha256:a17be5104c2749cc8120e07dd63cb07fe8271f36fdb8f4a27ec46ddcf8581422
          env:
            - name: PORT
              value: "11011"
            - name: BASE_PATH
              value: ""
            - name: PUID
              value: "100000"
            - name: PGID
              value: "100000"
            - name: UMASK
              value: "022"
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 11011
          livenessProbe:
            httpGet:
              path: /health
              port: 11011
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 11011
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: cleanuparr-config
        - name: downloads
          persistentVolumeClaim:
            claimName: servarr-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: cleanuparr
  namespace: servarr
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: cleanuparr
  ports:
    - port: 11011
      targetPort: 11011
      name: http

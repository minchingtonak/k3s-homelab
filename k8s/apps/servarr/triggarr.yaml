---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triggarr-config
  namespace: servarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triggarr
  namespace: servarr
  labels:
    app.kubernetes.io/name: triggarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: triggarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: triggarr
    spec:
      securityContext:
        fsGroup: 100000
      containers:
        - name: triggarr
          image: ghcr.io/thejuran/triggarr:v2.9.0@sha256:571e3199966620f96abe3d8695e4b513f202abf0dc751275de05ca0bf164e29b
          # copy read-only secret to writable /config dir, then hand off to the real entrypoint
          command: ["/bin/sh", "-c"]
          args: [
            "cp /triggarr.toml.src /config/triggarr.toml && exec /entrypoint.sh"
          ]
          env:
            - name: PUID
              value: "100000"
            - name: PGID
              value: "100000"
            - name: TRUSTED_PROXY_IPS
              value: "0.0.0.0/0"
          ports:
            - name: http
              containerPort: 8484
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETUID
                - SETGID
          volumeMounts:
            - name: config
              mountPath: /config
            - name: triggarr-secret
              mountPath: /triggarr.toml.src
              subPath: triggarr.toml
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: triggarr-config
        - name: triggarr-secret
          configMap:
            name: triggarr-config
---
apiVersion: v1
kind: Service
metadata:
  name: triggarr
  namespace: servarr
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: triggarr
  ports:
    - port: 8484
      targetPort: 8484
      name: http

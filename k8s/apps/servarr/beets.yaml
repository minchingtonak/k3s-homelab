---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beets-config
  namespace: servarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: beets-config
  namespace: servarr
data:
  config.yaml: |
    directory: /music
    library: /config/library.db

    import:
      copy: no
      move: no
      write: yes
      timid: no
      autotag: no           # trust Lidarr's MusicBrainz tags; only enrich
      quiet: yes
      incremental: yes      # skip album dirs already processed
      resume: yes
      log: /config/import.log

    # https://beets.readthedocs.io/en/stable/plugins/index.html
    plugins: lastgenre replaygain web

    web:
      host: 0.0.0.0
      port: 8337

    lastgenre:
      auto: no              # run explicitly post-import (import-stage write is unreliable under autotag:no)
      title_case: yes
      source: album
      count: 3
      force: yes
      keep_existing: yes

    replaygain:
      auto: no               # run explicitly post-import (auto-on-import doesn't fire under autotag:no)
      backend: ffmpeg
      peak: "true"
      overwrite: no
  webhook.py: |
    import json
    import subprocess
    from http.server import BaseHTTPRequestHandler, HTTPServer

    BEET = "/lsiopy/bin/beet"
    MUSIC_ROOT = "/music"


    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
            else:
                self.send_response(404)
                self.end_headers()

        def do_POST(self):
            if self.path != "/import":
                self.send_response(404)
                self.end_headers()
                return
            length = int(self.headers.get("Content-Length", 0))
            try:
                body = json.loads(self.rfile.read(length))
            except (ValueError, KeyError):
                self.send_response(400)
                self.end_headers()
                self.wfile.write(b'{"error":"bad json"}')
                return
            path = body.get("path", "")
            if not path.startswith(MUSIC_ROOT + "/"):
                self.send_response(400)
                self.end_headers()
                self.wfile.write(b'{"error":"bad path"}')
                return
            subprocess.Popen([BEET, "import", "--quiet", path])
            self.send_response(202)
            self.end_headers()
            self.wfile.write(b'{"status":"queued"}')

        def log_message(self, format, *args):
            print(f"{self.address_string()} {format % args}", flush=True)


    HTTPServer(("0.0.0.0", 9000), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beets
  namespace: servarr
  labels:
    app.kubernetes.io/name: beets
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: beets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beets
    spec:
      securityContext:
        fsGroup: 100000
      initContainers:
        - name: copy-config
          image: busybox:1.38.0
          command: ["cp", "/config.yaml.src", "/config/config.yaml"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-src
              mountPath: /config.yaml.src
              subPath: config.yaml
      containers:
        - name: beets
          image: ghcr.io/linuxserver/beets:2.12.0@sha256:1da97d79bc39a002ca32099ddf9e3a94a3f6809c9a661e079691701ecc1bf67e
          ports:
            - containerPort: 8337
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "100000"
            - name: PGID
              value: "100000"
            - name: BEETSDIR
              value: /config
            - name: HOME
              value: /config
          volumeMounts:
            - name: config
              mountPath: /config
            - name: music
              mountPath: /music
        - name: beets-webhook
          image: ghcr.io/linuxserver/beets:2.12.0@sha256:1da97d79bc39a002ca32099ddf9e3a94a3f6809c9a661e079691701ecc1bf67e
          command: ["python3", "/scripts/webhook.py"]
          securityContext:
            runAsUser: 100000
            runAsGroup: 100000
          ports:
            - containerPort: 9000
              name: hook
          env:
            - name: BEETSDIR
              value: /config
            - name: HOME
              value: /config
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-src
              mountPath: /scripts/webhook.py
              subPath: webhook.py
            - name: music
              mountPath: /music
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: beets-config
        - name: config-src
          configMap:
            name: beets-config
        - name: music
          persistentVolumeClaim:
            claimName: beets-music
---
apiVersion: v1
kind: Service
metadata:
  name: beets
  namespace: servarr
spec:
  selector:
    app.kubernetes.io/name: beets
  ports:
    - port: 8337
      targetPort: 8337
      name: web
    - port: 9000
      targetPort: hook
      name: hook

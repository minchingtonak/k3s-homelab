---
# servarr-config-vars holds only the secret VALUES that get substituted into
# plaintext ConfigMaps in k8s/apps/servarr by Flux postBuild.substituteFrom.
# Lives in flux-system (NOT servarr) because Flux postBuild.substituteFrom
# only looks for the referenced Secret in the same namespace as the Flux
# Kustomization itself (no cross-namespace lookup).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: servarr-config-vars
  namespace: flux-system
spec:
  encryptedData:
    SECRET_SLSKD_API_KEY: 
    SECRET_SLSKD_PASSWORD: 
    SECRET_SLSKD_USERNAME: 
    SECRET_SOULSEEK_PASSWORD: 
    SECRET_SOULSEEK_USER: 
  template:
    metadata:
      name: servarr-config-vars
      namespace: flux-system
    type: Opaque
# ---

---
# servarr-config-vars holds only the secret VALUES that get substituted into
# plaintext ConfigMaps in k8s/apps/servarr by Flux postBuild.substituteFrom.
# Lives in its own Flux Kustomization (servarr-vars) so that the Secret exists
# before the substituting Kustomization (servarr) reconciles — otherwise
# postBuild substitution fails with "secret not found" and the SealedSecret
# itself can never get applied (chicken-and-egg).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: servarr-config-vars
  namespace: servarr
spec:
  encryptedData:
    SECRET_SLSKD_API_KEY: 
    SECRET_SLSKD_PASSWORD: 
    SECRET_SLSKD_USERNAME: 
    SECRET_SOULSEEK_PASSWORD: 
    SECRET_SOULSEEK_USER: 
  template:
    metadata:
      name: servarr-config-vars
      namespace: servarr
    type: Opaque
# ---
# Plaintext template for re-sealing (values redacted):
# apiVersion: v1
# kind: Secret
# metadata:
#   name: servarr-config-vars
#   namespace: servarr
# type: Opaque
# stringData:
#   SECRET_SLSKD_USERNAME: FIXME  # slskd web auth username
#   SECRET_SLSKD_PASSWORD: FIXME  # slskd web auth password
#   SECRET_SLSKD_API_KEY:  FIXME  # slskd homepage widget readonly API key
#   SECRET_SOULSEEK_USER:  FIXME  # Soulseek network username
#   SECRET_SOULSEEK_PASSWORD: FIXME  # Soulseek network password

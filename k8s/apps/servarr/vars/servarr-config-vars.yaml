#   SECRET_SOULSEEK_USER:  FIXME           # Soulseek network username
#   SECRET_SOULSEEK_PASSWORD: FIXME        # Soulseek network password
#   SECRET_RADARR_API_KEY: FIXME           # Radarr API key (triggarr)
#   SECRET_SONARR_API_KEY: FIXME           # Sonarr API key (triggarr)
#   SECRET_USER_TOKEN: FIXME               # Pushover user/group key (apprise)
#   SECRET_PUSHOVER_RADARR_TOKEN: FIXME    # Pushover app token for radarr
#   SECRET_PUSHOVER_SONARR_TOKEN: FIXME    # Pushover app token for sonarr
#   SECRET_PUSHOVER_LIDARR_TOKEN: FIXME    # Pushover app token for lidarr
#   SECRET_PUSHOVER_BAZARR_TOKEN: FIXME    # Pushover app token for bazarr
#   SECRET_PUSHOVER_HUNTARR_TOKEN: FIXME   # Pushover app token for huntarr
#   SECRET_PUSHOVER_CLEANUPARR_TOKEN: FIXME # Pushover app token for cleanuparr

# apiVersion: v1
# kind: Secret
# metadata:
#   name: servarr-config-vars
#   namespace: flux-system
# type: Opaque
# stringData:
#   SECRET_SLSKD_USERNAME: FIXME  # slskd web auth username
#   SECRET_SLSKD_PASSWORD: FIXME  # slskd web auth password
#   SECRET_SLSKD_API_KEY:  FIXME  # slskd homepage widget readonly API key
#   SECRET_SOULSEEK_USER:  FIXME  # Soulseek network username
#   SECRET_SOULSEEK_PASSWORD: FIXME  # Soulseek network password

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lidarr-config
  namespace: servarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lidarr-beets-hook
  namespace: servarr
data:
  beets-import.sh: |
    #!/bin/bash
    set -euo pipefail
    [ "$$Lidarr_EventType" = "Test" ] && exit 0
    [ "$$Lidarr_EventType" = "AlbumDownload" ] || exit 0

    IFS='|' read -ra TRACKS <<< "$$Lidarr_AddedTrackPaths"
    declare -A SEEN
    DIRS=()
    for t in "$${TRACKS[@]}"; do
        d="$$(dirname "$$t")"
        d="$${d/\/data\/music//music}"
        [[ -z "$${SEEN[$$d]+_}" ]] && { SEEN[$$d]=1; DIRS+=("$$d"); }
    done

    for d in "$${DIRS[@]}"; do
        curl -fsS -X POST http://beets.servarr.svc.cluster.local:9000/import \
             -H 'Content-Type: application/json' \
             -d "{\"path\": \"$$d\"}"
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: servarr
  labels:
    app.kubernetes.io/name: lidarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: lidarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lidarr
    spec:
      securityContext:
        fsGroup: 100000
      containers:
        - name: lidarr
          image: ghcr.io/hotio/lidarr:pr-plugins-3.1.2.4913@sha256:ae0b3b14769fdfeb73fe5d9e61ebcda04edf202244bcbd6323d2fe1381154f57
          env:
            - name: PUID
              value: "100000"
            - name: PGID
              value: "100000"
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 8686
          livenessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 4
            timeoutSeconds: 4
          readinessProbe:
            httpGet:
              path: /ping
              port: 8686
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 4
          volumeMounts:
            - name: config
              mountPath: /config
            - name: music
              mountPath: /data/music
            - name: downloads
              mountPath: /data/downloads
            - name: beets-hook
              mountPath: /scripts/beets-import.sh
              subPath: beets-import.sh
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: lidarr-config
        - name: music
          persistentVolumeClaim:
            claimName: servarr-music
        - name: downloads
          persistentVolumeClaim:
            claimName: servarr-downloads
        - name: beets-hook
          configMap:
            name: lidarr-beets-hook
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: lidarr
  namespace: servarr
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: lidarr
  ports:
    - port: 8686
      targetPort: 8686
      name: http

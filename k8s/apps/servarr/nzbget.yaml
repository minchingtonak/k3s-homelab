---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nzbget-config
  namespace: servarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nzbget
  namespace: servarr
  labels:
    app.kubernetes.io/name: nzbget
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nzbget
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nzbget
    spec:
      # nzbget talks TLS to paid usenet providers — no peer exposure, so it
      # does not need the gluetun VPN. routing it through the VPN tunnel rotated
      # the exit IP on reconnects and tripped Highwinds' simultaneous-IP limit,
      # collapsing throughput. running it direct uses the stable WAN IP.
      securityContext:
        fsGroup: 100000
      containers:
        - name: nzbget
          image: ghcr.io/linuxserver/nzbget:v25.4-ls228@sha256:51184d6996a33e79f5db2136c31724f3ce783fde708b3ef780f259e7f168e76a
          env:
            - name: PUID
              value: "100000"
            - name: PGID
              value: "100000"
            - name: TZ
              value: America/New_York
          ports:
            - name: http
              containerPort: 6789
          livenessProbe:
            httpGet:
              path: /
              port: 6789
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 8
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /data/downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: nzbget-config
        - name: downloads
          persistentVolumeClaim:
            claimName: servarr-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: nzbget
  namespace: servarr
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: nzbget
  ports:
    - name: http
      port: 6789
      targetPort: 6789

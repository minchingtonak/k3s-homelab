---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbittorrent
  namespace: servarr
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "qBittorrent"
    gethomepage.dev/description: "BitTorrent client"
    gethomepage.dev/group: "servarr"
    gethomepage.dev/icon: "qbittorrent.png"
    gethomepage.dev/href: "https://qbittorrent.item.fyi"
    gethomepage.dev/siteMonitor: "http://qbittorrent.servarr.svc.cluster.local:8081"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=downloaders"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`qbittorrent.item.fyi`) && PathPrefix(`/api`)
      services:
        - name: qbittorrent
          port: 8081
    - kind: Rule
      match: Host(`qbittorrent.item.fyi`)
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: qbittorrent
          port: 8081
  tls: {}

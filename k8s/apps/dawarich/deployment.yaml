apiVersion: v1
kind: Namespace
metadata:
  name: dawarich
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dawarich-postgres
  namespace: dawarich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dawarich-redis
  namespace: dawarich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dawarich-data
  namespace: dawarich
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-postgres
  namespace: dawarich
  labels:
    app.kubernetes.io/name: dawarich-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dawarich-postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:17-3.5-alpine@sha256:6ebb2b32a6d5315c8fc2b00427356eebd4778bfaf7211d4b28eac481f3d194ec
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dawarich
                  key: DATABASE_PASSWORD
            - name: POSTGRES_DB
              value: dawarich_development
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "dawarich_development"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: shared-mem
              mountPath: /dev/shm
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: dawarich-postgres
        - name: shared-mem
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-postgres
  namespace: dawarich
spec:
  selector:
    app.kubernetes.io/name: dawarich-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-redis
  namespace: dawarich
  labels:
    app.kubernetes.io/name: dawarich-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dawarich-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
          command: ["redis-server"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: dawarich-redis
---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-redis
  namespace: dawarich
spec:
  selector:
    app.kubernetes.io/name: dawarich-redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-app
  namespace: dawarich
  labels:
    app.kubernetes.io/name: dawarich-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dawarich-app
    spec:
      enableServiceLinks: false
      containers:
        - name: dawarich
          image: freikin/dawarich:1.0.1@sha256:ce2a337a1c2d521cf7d5265abe5abb1f9a645322e7184b6a20fd8ff59943a9e1
          stdin: true
          tty: true
          command: ["web-entrypoint.sh"]
          args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
          env:
            - name: RAILS_ENV
              value: development
            - name: APPLICATION_HOSTS
              value: dawarich.item.fyi
            - name: APPLICATION_PROTOCOL
              value: http
            - name: TIME_ZONE
              value: America/New_York
            - name: REDIS_URL
              value: redis://dawarich-redis:6379
            - name: DATABASE_HOST
              value: dawarich-postgres
            - name: DATABASE_USERNAME
              value: postgres
            - name: DATABASE_NAME
              value: dawarich_development
            - name: MIN_MINUTES_SPENT_IN_CITY
              value: "60"
            - name: SELF_HOSTED
              value: "true"
            - name: STORE_GEODATA
              value: "true"
            - name: PROMETHEUS_EXPORTER_ENABLED
              value: "false"
            - name: OIDC_PROVIDER_NAME
              value: Pocket ID
            - name: OIDC_AUTO_REGISTER
              value: "false"
            - name: ALLOW_EMAIL_PASSWORD_REGISTRATION
              value: "true"
            - name: OIDC_REDIRECT_URI
              value: https://dawarich.item.fyi/users/auth/openid_connect/callback
            - name: OIDC_ISSUER
              value: https://pocket-id.admin.homelab.akmin.dev
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dawarich
                  key: DATABASE_PASSWORD
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: dawarich
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dawarich
                  key: OIDC_CLIENT_SECRET
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/app/public
              subPath: public
            - name: data
              mountPath: /var/app/storage
              subPath: storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dawarich-data
---
apiVersion: v1
kind: Service
metadata:
  name: dawarich
  namespace: dawarich
spec:
  selector:
    app.kubernetes.io/name: dawarich-app
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-sidekiq
  namespace: dawarich
  labels:
    app.kubernetes.io/name: dawarich-sidekiq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich-sidekiq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dawarich-sidekiq
    spec:
      enableServiceLinks: false
      containers:
        - name: sidekiq
          image: freikin/dawarich:1.0.1@sha256:ce2a337a1c2d521cf7d5265abe5abb1f9a645322e7184b6a20fd8ff59943a9e1
          stdin: true
          tty: true
          command: ["sidekiq-entrypoint.sh"]
          args: ["sidekiq"]
          env:
            - name: RAILS_ENV
              value: development
            - name: APPLICATION_HOSTS
              value: dawarich.item.fyi
            - name: APPLICATION_PROTOCOL
              value: http
            - name: REDIS_URL
              value: redis://dawarich-redis:6379
            - name: DATABASE_HOST
              value: dawarich-postgres
            - name: DATABASE_USERNAME
              value: postgres
            - name: DATABASE_NAME
              value: dawarich_development
            - name: BACKGROUND_PROCESSING_CONCURRENCY
              value: "10"
            - name: SELF_HOSTED
              value: "true"
            - name: STORE_GEODATA
              value: "true"
            - name: PROMETHEUS_EXPORTER_ENABLED
              value: "false"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dawarich
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/app/public
              subPath: public
            - name: data
              mountPath: /var/app/storage
              subPath: storage
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dawarich-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  namespace: syncthing
  labels:
    app.kubernetes.io/name: syncthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: syncthing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syncthing
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: syncthing
          image: docker.io/syncthing/syncthing:2.0.16@sha256:4a961394ca471f4e48f31ad2cef50697e502c8799e2e98477a1c3844e0c5bc54
          ports:
            - name: web-ui
              containerPort: 8384
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /var/syncthing
            - name: backups
              mountPath: /mnt/backup-data/backups
            - name: documents
              mountPath: /mnt/documents
            - name: documents
              mountPath: /mnt/backup-data/documents
            - name: drive
              mountPath: /mnt/drive
            - name: drive
              mountPath: /mnt/backup-data/drive
            - name: photos
              mountPath: /mnt/photos
            - name: photos
              mountPath: /mnt/backup-data/photos
            - name: media
              mountPath: /mnt/media
            - name: repos
              mountPath: /mnt/repos
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: syncthing-config
        - name: backups
          persistentVolumeClaim:
            claimName: syncthing-backups
        - name: documents
          persistentVolumeClaim:
            claimName: syncthing-documents
        - name: drive
          persistentVolumeClaim:
            claimName: syncthing-drive
        - name: photos
          persistentVolumeClaim:
            claimName: syncthing-photos
        - name: media
          persistentVolumeClaim:
            claimName: syncthing-media
        - name: repos
          persistentVolumeClaim:
            claimName: syncthing-repos
---
apiVersion: v1
kind: Service
metadata:
  name: syncthing
  namespace: syncthing
spec:
  selector:
    app.kubernetes.io/name: syncthing
  ports:
    - port: 80
      targetPort: 8384
      name: http

apiVersion: v1
kind: Namespace
metadata:
  name: syncthing
---
# Dynamic PVC — nfs-zfs provisioner for syncthing config/db
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syncthing-config
  namespace: syncthing
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 1Gi
---
# Static PV/PVC pairs — direct NFS mounts to existing Proxmox paths on void pool
apiVersion: v1
kind: PersistentVolume
metadata:
  name: syncthing-backups
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: syncthing-backups
    namespace: syncthing
  nfs:
    server: 192.168.8.89
    path: /void/backups
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syncthing-backups
  namespace: syncthing
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: syncthing-backups
  resources:
    requests:
      storage: 500Gi
---

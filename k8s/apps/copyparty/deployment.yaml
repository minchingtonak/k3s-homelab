---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copyparty
  namespace: copyparty
  labels:
    app.kubernetes.io/name: copyparty
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: copyparty
  template:
    metadata:
      labels:
        app.kubernetes.io/name: copyparty
    spec:
      securityContext:
        runAsUser: 100000
        runAsGroup: 100000
      containers:
        - name: copyparty
          image: copyparty/ac:1.20.16@sha256:1d6839e391ba80f397eb59a662cf4fec549b4e9346ac2165b44e594b628cdabb
          ports:
            - containerPort: 3939
          volumeMounts:
            - name: cfg
              mountPath: /cfg
            - name: config
              mountPath: /cfg/copyparty.conf
              subPath: copyparty.conf
            - name: audiobooks
              mountPath: /mnt/audiobooks
            - name: backups
              mountPath: /mnt/backups
            - name: documents
              mountPath: /mnt/documents
            - name: drive
              mountPath: /mnt/drive
            - name: media
              mountPath: /mnt/media
            - name: photos
              mountPath: /mnt/photos
            - name: podcasts
              mountPath: /mnt/podcasts
            - name: restic
              mountPath: /mnt/restic
            - name: appdata
              mountPath: /mnt/appdata
      volumes:
        - name: cfg
          persistentVolumeClaim:
            claimName: copyparty-cfg
        - name: config
          configMap:
            name: copyparty-config
        - name: audiobooks
          persistentVolumeClaim:
            claimName: copyparty-audiobooks
        - name: backups
          persistentVolumeClaim:
            claimName: copyparty-backups
        - name: documents
          persistentVolumeClaim:
            claimName: copyparty-documents
        - name: drive
          persistentVolumeClaim:
            claimName: copyparty-drive
        - name: media
          persistentVolumeClaim:
            claimName: copyparty-media
        - name: photos
          persistentVolumeClaim:
            claimName: copyparty-photos
        - name: podcasts
          persistentVolumeClaim:
            claimName: copyparty-podcasts
        - name: restic
          persistentVolumeClaim:
            claimName: copyparty-restic
        - name: appdata
          persistentVolumeClaim:
            claimName: copyparty-appdata
---
apiVersion: v1
kind: Service
metadata:
  name: copyparty
  namespace: copyparty
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: copyparty
  ports:
    - port: 3939
      targetPort: 3939

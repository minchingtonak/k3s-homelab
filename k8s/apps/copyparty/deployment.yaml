apiVersion: v1
kind: Namespace
metadata:
  name: copyparty
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: copyparty-config
  namespace: copyparty
data:
  copyparty.conf: |
    # https://github.com/9001/copyparty/blob/hovudstraum/docs/example.conf
    # append some arguments to the commandline;
    # accepts anything listed in --help (leading dashes are optional)
    # and inline comments are OK if there is 2 spaces before the '#'
    [global]
      p: 3939  # listen on 3939
      e2dsa  # enable file indexing and filesystem scanning
      e2ts   # and enable multimedia indexing
      z  # and zeroconf
      hist: /cfg/hists/  # store histories in cfg dir instead of in each volume
      xff-src: lan  # reverse proxy configuration
      xff-hdr: x-forwarded-for
      rproxy: 1

    [/mnt]
      /mnt
      accs:
        # https://github.com/9001/copyparty#accounts-and-volumes
        A: *  # same as rwmda (read/write/move/delete/admin/dotfiles)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-cfg
  namespace: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: copyparty-audiobooks
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: copyparty-audiobooks
    namespace: copyparty
  nfs:
    server: 192.168.8.89
    path: /void/audiobooks
---
apiVersion: v1

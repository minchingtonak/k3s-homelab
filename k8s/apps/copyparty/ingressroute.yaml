apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: copyparty
  namespace: copyparty
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Copyparty"
    gethomepage.dev/description: "File sharing"
    gethomepage.dev/group: "Tools"
    gethomepage.dev/icon: "sh-copyparty.svg"
    gethomepage.dev/href: "https://copyparty.item.fyi"
    gethomepage.dev/siteMonitor: "http://copyparty.copyparty.svc.cluster.local:3939"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`copyparty.item.fyi`)
      middlewares:
        - name: authentik
          namespace: authentik
      services:
        - name: copyparty
          port: 3939
  tls: {}

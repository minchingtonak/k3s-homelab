apiVersion: v1
kind: Namespace
metadata:
  name: trip
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trip-data
  namespace: trip
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip
  namespace: trip
  labels:
    app.kubernetes.io/name: trip
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trip
    spec:
      containers:
        - name: trip
          image: ghcr.io/itskovacs/trip:1.45.2@sha256:a6f616a42f48e3043f30c4ca99e680446ace6eeeddaefeb6dd59ac0f4b65ba8c
          command: ["fastapi", "run", "/app/trip/main.py", "--host", "0.0.0.0"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app/storage
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trip-data
---
apiVersion: v1
kind: Service
metadata:
  name: trip
  namespace: trip
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: trip
  ports:
    - port: 80
      targetPort: 8000
      name: http

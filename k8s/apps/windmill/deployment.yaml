  template:
    metadata:
      labels:
        app.kubernetes.io/name: windmill-worker-native
      annotations:
        secret.reloader.stakater.com/reload: windmill
    spec:
      containers:
        - name: windmill-worker-native
          image: ghcr.io/windmill-labs/windmill:1.682.0@sha256:80dbab38006b9c4105d1083c2a8b293c796509f71005a5418bd6ba1e85befee0
          env:
            - name: MODE
              value: worker
            - name: WORKER_GROUP
              value: native
            - name: NUM_WORKERS
              value: "2"
            - name: SLEEP_QUEUE
              value: "200"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: windmill
                  key: DATABASE_URL
            - name: BASE_URL
              value: https://windmill.item.fyi
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---

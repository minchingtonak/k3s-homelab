apiVersion: v1
kind: Namespace
metadata:
  name: windmill
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: windmill-postgres
  namespace: windmill
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-zfs
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windmill-postgres
  namespace: windmill
  labels:
    app.kubernetes.io/name: windmill-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: windmill-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: windmill-postgres
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:16@sha256:46b64df84f4c8c5bd586952eb8ff813f1ce12f1bc36eb12af678894b6a66ab89
          env:
            - name: POSTGRES_DB
              value: windmill
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: windmill
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "windmill"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
            - name: shared-mem
              mountPath: /dev/shm
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: windmill-postgres
        - name: shared-mem
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: windmill-postgres
  namespace: windmill
spec:
  selector:
    app.kubernetes.io/name: windmill-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windmill-server
  namespace: windmill
  labels:
    app.kubernetes.io/name: windmill-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: windmill-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: windmill-server
      annotations:
        secret.reloader.stakater.com/reload: windmill
    spec:
      containers:
        - name: windmill-server
          # https://github.com/windmill-labs/windmill/releases/tag/v1.682.0
          image: ghcr.io/windmill-labs/windmill:1.682.0@sha256:80dbab38006b9c4105d1083c2a8b293c796509f71005a5418bd6ba1e85befee0
          env:
            - name: MODE
              value: server
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: windmill
                  key: DATABASE_URL
            - name: BASE_URL
              value: https://windmill.item.fyi
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/version
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: windmill
  namespace: windmill
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: windmill-server
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windmill-worker
  namespace: windmill
  labels:
    app.kubernetes.io/name: windmill-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: windmill-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: windmill-worker
      annotations:
        secret.reloader.stakater.com/reload: windmill
    spec:
      containers:
        - name: windmill-worker
          image: ghcr.io/windmill-labs/windmill:1.682.0@sha256:80dbab38006b9c4105d1083c2a8b293c796509f71005a5418bd6ba1e85befee0
          env:
            - name: MODE
              value: worker
            - name: WORKER_GROUP
              value: default
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: windmill
                  key: DATABASE_URL
            - name: BASE_URL
              value: https://windmill.item.fyi
          volumeMounts:
            - name: worker-cache
              mountPath: /tmp/windmill/cache
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: worker-cache
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: windmill-worker-native
  namespace: windmill
  labels:
    app.kubernetes.io/name: windmill-worker-native
spec:

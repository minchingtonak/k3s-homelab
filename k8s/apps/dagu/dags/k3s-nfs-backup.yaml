description: back up k3s NFS PVC data (ZFS snapshot -> PBS)
schedule: "0 2 * * *" # 02:00am, 2h after existing midnight backup

handler_on:
  exit: # always runs
    command: >-
      zfs destroy fast/k3s-nfs@k3s-nfs-backup-${DAG_RUN_ID} 2>/dev/null || true;
      rm -rf /tmp/dag-${DAG_RUN_ID}
    type: ssh
    config:
      user: "root"
      host: "192.168.20.89"
      key: /etc/dagu/proxmox_ed25519
      strict_host_key: false
      shell: "/bin/bash -e"

steps:
  - name: setup
    script: |
      #!/bin/bash
      set -Eeuxo pipefail

      apt-get -qq update
      DEBIAN_FRONTEND=noninteractive apt-get -y -qq install openssh-client

      WORK_DIR="/tmp/dag-${DAG_RUN_ID}"
      KEY="$WORK_DIR/key"
      mkdir -p "$WORK_DIR"
      install -m 0600 /etc/dagu/proxmox_ed25519 "$KEY"

      scp -r -i "$KEY" \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        /dagu/dags/scripts/* root@192.168.20.89:$WORK_DIR

      ssh -i "$KEY" \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        root@192.168.20.89 \
        "chmod +x $WORK_DIR/*.sh && zfs snapshot fast/k3s-nfs@k3s-nfs-backup-${DAG_RUN_ID}"

  - name: run-local-pbs-backup-script
    command: cd /tmp/dag-${DAG_RUN_ID} && ./k3s-nfs-local-pbs-backup.sh "k3s-nfs-backup-${DAG_RUN_ID}"
    shell: bash
    continue_on:
      failure: true
    type: ssh
    config:
      user: "root"
      host: "192.168.20.89"
      key: /etc/dagu/proxmox_ed25519
      strict_host_key: false
      shell: "/bin/bash -e"
    depends: setup

  # - name: run-cloud-pbs-backup-script
  #   command: cd /tmp/dag-${DAG_RUN_ID} && ./k3s-nfs-cloud-pbs-backup.sh "k3s-nfs-backup-${DAG_RUN_ID}"
  #   shell: bash
  #   type: ssh
  #   config:
  #     user: "root"
  #     host: "192.168.20.89"
  #     key: /etc/dagu/proxmox_ed25519
  #     strict_host_key: false
  #     shell: "/bin/bash -e"

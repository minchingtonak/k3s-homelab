apiVersion: v1
kind: ConfigMap
metadata:
  name: dagu-env
  namespace: dagu
data:
  env.sh: |
    # Sourced by every backup script. Values are injected by Flux
    # postBuild.substituteFrom at reconcile time from the dagu-vars Secret.
    export SECRET_BACKUP_SCRIPT_SLACK_WEBHOOK='${SECRET_BACKUP_SCRIPT_SLACK_WEBHOOK}'
    export SECRET_PUSHOVER_BACKUP_JOB_TOKEN='${SECRET_PUSHOVER_BACKUP_JOB_TOKEN}'
    export SECRET_PUSHOVER_USER_TOKEN='${SECRET_PUSHOVER_USER_TOKEN}'
    export SECRET_LOCAL_PBS_FINGERPRINT='${SECRET_LOCAL_PBS_FINGERPRINT}'
    export SECRET_EDSAC_PBS_PASSWORD='${SECRET_EDSAC_PBS_PASSWORD}'
    export SECRET_CLOUD_PBS_API_TOKEN_SECRET='${SECRET_CLOUD_PBS_API_TOKEN_SECRET}'
    export SECRET_APPDATA_ENCRYPTION_PASSWORD='${SECRET_APPDATA_ENCRYPTION_PASSWORD}'
    export SECRET_PERSONAL_FILES_AND_CLOUD_PBS_ENCRYPTION_PASSWORD='${SECRET_PERSONAL_FILES_AND_CLOUD_PBS_ENCRYPTION_PASSWORD}'
    export SECRET_K3S_NFS_ENCRYPTION_PASSWORD='${SECRET_K3S_NFS_ENCRYPTION_PASSWORD}'
    export SECRET_APPDATA_HEALTHCHECK_URL='${SECRET_APPDATA_HEALTHCHECK_URL}'
    export SECRET_PERSONAL_FILES_HEALTHCHECK_URL='${SECRET_PERSONAL_FILES_HEALTHCHECK_URL}'
    export SECRET_MUSIC_HEALTHCHECK_URL='${SECRET_MUSIC_HEALTHCHECK_URL}'
    export SECRET_CLOUD_PBS_BACKUP_HEALTHCHECK_URL='${SECRET_CLOUD_PBS_BACKUP_HEALTHCHECK_URL}'
    export SECRET_K3S_NFS_HEALTHCHECK_URL='${SECRET_K3S_NFS_HEALTHCHECK_URL}'
    export SECRET_K3S_NFS_CLOUD_HEALTHCHECK_URL='${SECRET_K3S_NFS_CLOUD_HEALTHCHECK_URL}'

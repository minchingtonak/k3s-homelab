apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-lego-webhook
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager-lego-webhook
      version: "1.4.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-lego-webhook
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    certManager:
      namespace: cert-manager
      serviceAccountName: cert-manager

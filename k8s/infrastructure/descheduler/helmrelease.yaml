apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler-system
spec:
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: "0.36.0" # https://github.com/kubernetes-sigs/descheduler/releases
      sourceRef:
        kind: HelmRepository
        name: descheduler
      interval: 1h
  values:
    kind: CronJob
    schedule: "*/3 * * * *"
    deschedulerPolicyAPIVersion: "descheduler/v1alpha2"
    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 5
      maxNoOfPodsToEvictPerNamespace: 5
      # Real-utilization mode: LowNodeUtilization reads node CPU/memory from
      # metrics-server (metrics.k8s.io API, managed via Flux HelmRelease) instead
      # of summing pod requests.
      metricsProviders:
        - source: KubernetesMetrics
      profiles:
        - name: rebalance
          pluginConfig:
            - name: DefaultEvictor
              # Use chart defaults: PodsWithLocalStorage are protected (emptyDir/hostPath),
              # PVC-backed pods are evictable (volumes reattach on reschedule).
            - name: RemoveDuplicates
            - name: RemovePodsHavingTooManyRestarts
              args:
                podRestartThreshold: 100
                includingInitContainers: true
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: LowNodeUtilization
              args:
                thresholds:
                  cpu: 30
                  memory: 30
                targetThresholds:
                  cpu: 70
                  memory: 70
                metricsUtilization:
                  source: KubernetesMetrics
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
                - RemoveDuplicates
            deschedule:
              enabled:
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingNodeAffinity
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

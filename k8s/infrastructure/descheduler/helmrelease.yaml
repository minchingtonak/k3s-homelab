apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler-system
spec:
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: "0.36.0" # https://github.com/kubernetes-sigs/descheduler/releases
      sourceRef:
        kind: HelmRepository
        name: descheduler
      interval: 1h
  values:
    kind: CronJob
    schedule: "*/5 * * * *"
    deschedulerPolicyAPIVersion: "descheduler/v1alpha2"
    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 5
      maxNoOfPodsToEvictPerNamespace: 5
      # Real-utilization mode: LowNodeUtilization reads node CPU from Prometheus
      # instead of summing pod requests. Anonymous access works against the
      # in-cluster kube-prometheus-stack (no auth enforced).
      metricsProviders:
        - source: Prometheus
          prometheus:
            url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      profiles:
        - name: rebalance
          pluginConfig:
            - name: DefaultEvictor
              # Use chart defaults: PodsWithLocalStorage are protected (emptyDir/hostPath),
              # PVC-backed pods are evictable (volumes reattach on reschedule).
            - name: RemoveDuplicates
            - name: RemovePodsHavingTooManyRestarts
              args:
                podRestartThreshold: 100
                includingInitContainers: true
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: LowNodeUtilization
              args:
                # In Prometheus mode, thresholds key on the special `MetricResource`
                # name (cpu/memory/pods keys are invalid here — descheduler errors).
                # Query returns node CPU utilization in [0,1], relabeled so `instance`
                # equals the k8s node name (descheduler requires this).
                thresholds:
                  MetricResource: 30
                targetThresholds:
                  MetricResource: 70
                metricsUtilization:
                  source: Prometheus
                  prometheus:
                    query: |
                      clamp(
                        label_replace(
                          (1 - avg by (instance) (
                            rate(node_cpu_seconds_total{job="node-exporter",mode="idle"}[5m])
                          ))
                          * on (instance) group_left(node)
                            label_replace(kube_node_info, "instance", "$1:9100", "internal_ip", "(.+)"),
                          "instance", "$1", "node", "(.+)"
                        ),
                        0, 1
                      )
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
                - RemoveDuplicates
            deschedule:
              enabled:
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingNodeAffinity
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

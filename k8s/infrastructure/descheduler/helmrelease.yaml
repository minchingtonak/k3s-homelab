apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: descheduler-system
spec:
  interval: 1h
  chart:
    spec:
      chart: descheduler
      version: "0.36.0" # https://github.com/kubernetes-sigs/descheduler/releases
      sourceRef:
        kind: HelmRepository
        name: descheduler
      interval: 1h
  values:
    kind: CronJob
    schedule: "*/5 * * * *"
    # Uses pod-request based utilization. To switch to real metrics later,
    # add `metricsProviders: [{source: KubernetesMetrics}]` to deschedulerPolicy
    # (requires metrics-server) or `source: Prometheus` with a prometheus block.
    deschedulerPolicyAPIVersion: "descheduler/v1alpha2"
    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 5
      maxNoOfPodsToEvictPerNamespace: 5
      profiles:
        - name: rebalance
          pluginConfig:
            - name: DefaultEvictor
              # Use chart defaults: PodsWithLocalStorage are protected (emptyDir/hostPath),
              # PVC-backed pods are evictable (volumes reattach on reschedule).
            - name: RemoveDuplicates
            - name: RemovePodsHavingTooManyRestarts
              args:
                podRestartThreshold: 100
                includingInitContainers: true
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: LowNodeUtilization
              args:
                thresholds:
                  cpu: 40
                  memory: 40
                  pods: 30
                targetThresholds:
                  cpu: 75
                  memory: 75
                  pods: 70
          plugins:
            balance:
              enabled:
                - LowNodeUtilization
                - RemoveDuplicates
            deschedule:
              enabled:
                - RemovePodsHavingTooManyRestarts
                - RemovePodsViolatingNodeAffinity
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 1h
  chart:
    spec:
      chart: traefik
      version: "39.0.8" # https://github.com/traefik/traefik-helm-chart/releases
      sourceRef:
        kind: HelmRepository
        name: traefik
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    service:
      type: LoadBalancer
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "*.item.fyi,item.fyi"
    ports:
      ssh:
        port: 22
        expose:
          default: true
        exposedPort: 22
        protocol: TCP
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        http:
          tls:
            enabled: true
    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true
    api:
      insecure: true  # exposes /api/* on the traefik entrypoint (port 8080) for homepage widget
    ingressRoute:
      dashboard:
        enabled: false  # managed via ingressroute-dashboard.yaml instead
    logs:
      access:
        enabled: true
        format: json
        filters:
          statuscodes: "400-599"
    metrics:
      prometheus:
        addEntryPointsLabels: true
        addRoutersLabels: true
        addServicesLabels: true
        service:
          enabled: true  # dedicated ClusterIP service for metrics scraping
        serviceMonitor:
          enabled: false  # managed via separate manifest after kube-prometheus-stack deploys its CRDs

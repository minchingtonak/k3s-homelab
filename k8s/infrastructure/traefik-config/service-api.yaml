apiVersion: v1
kind: Service
metadata:
  name: traefik-api
  namespace: traefik-system
  annotations:
    gatus.home-operations.com/endpoint: |
      alerts:
        - type: pushover
spec:
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - name: api
      port: 9000
      targetPort: 8080
  type: ClusterIP

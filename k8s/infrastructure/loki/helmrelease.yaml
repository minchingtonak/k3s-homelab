apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      version: "6.55.0" # https://github.com/grafana/loki/blob/main/production/helm/loki/CHANGELOG.md
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    deploymentMode: SingleBinary

    singleBinary:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      persistence:
        size: 10Gi
        storageClass: nfs-zfs

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true

    # Disable gateway — Alloy connects directly on port 3100
    gateway:
      enabled: false

    # Zero out all non-SingleBinary deployment replicas
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0

    # Disable MinIO — using filesystem storage
    minio:
      enabled: false

    # Disable memcached caches — not needed for filesystem storage at homelab scale
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Disable canary — it exists to measure end-to-end log delivery SLOs in production
    # by writing synthetic log entries and querying them back. Not useful for a homelab
    # and produces noise in the Grafana log explorer under service_name=unknown_service.
    lokiCanary:
      enabled: false

    # Wire up Prometheus scraping via existing ServiceMonitor CRDs
    monitoring:
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metallb
      version: "0.16.0" # https://github.com/metallb/metallb/releases
      sourceRef:
        kind: HelmRepository
        name: metallb
      interval: 1h
  values:
    # frr-k8s is enabled by default in 0.16.0 but unused (we run L2 mode)
    frrk8s:
      enabled: false
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

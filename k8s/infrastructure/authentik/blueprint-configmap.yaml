  passwordless.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: passwordless passkey login
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # webauthn-only validation stage used inside the passwordless flow.
      # deny (not configure) so users without a passkey hard-fail here instead
      # of being shunted into setup — password+totp/webauthn enrollment is
      # already handled by default-authentication-mfa-validation on the normal flow.
      - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
        identifiers:
          name: passwordless-webauthn-validate
        attrs:
          not_configured_action: deny
          device_classes:
            - webauthn
          webauthn_user_verification: preferred

      # passwordless flow: webauthn check, then log the user in
      - model: authentik_flows.flow
        identifiers:
          slug: default-authentication-flow-passwordless
        attrs:
          name: Passwordless authentication
          title: Sign in with a passkey
          designation: authentication
          authentication: require_unauthenticated

      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, default-authentication-flow-passwordless]]
          order: 0
        attrs:
          stage: !Find [authentik_stages_authenticator_validate.authenticatorvalidatestage, [name, passwordless-webauthn-validate]]

      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !Find [authentik_flows.flow, [slug, default-authentication-flow-passwordless]]
          order: 10
        attrs:
          stage: !Find [authentik_stages_user_login.userloginstage, [name, default-authentication-login]]

      # patch the built-in identification stage: expose the passwordless flow
      # as a shortcut button and enable webauthn conditional-ui autofill on
      # the username field.
      # user_fields must be re-declared because the blueprint serializer treats
      # this as a full update — omitting it would empty the field and fail the
      # serializer's "user_fields or sources required" check.
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: default-authentication-identification
        attrs:
          user_fields:
            - email
            - username
          passwordless_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow-passwordless]]
          webauthn_stage: !Find [authentik_stages_authenticator_validate.authenticatorvalidatestage, [name, passwordless-webauthn-validate]]

  user-akmin.yaml: |
    version: 1
    metadata:
      name: akmin user
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.user
        state: present
        identifiers:
          username: akmin
        attrs:
          name: akmin
          email: ${SECRET_AUTHENTIK_AKMIN_EMAIL}
          password: ${SECRET_AUTHENTIK_AKMIN_PASSWORD}
          path: users
          is_active: true

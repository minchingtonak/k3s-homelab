apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  forward-auth.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: domain-level forward auth
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # proxy provider for domain-level forward auth
      - model: authentik_providers_proxy.proxyprovider
        id: forward-auth-provider
        identifiers:
          name: forward-auth-domain
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          mode: forward_domain
          external_host: https://auth.item.fyi
          cookie_domain: item.fyi

      # application linked to the proxy provider
      - model: authentik_core.application
        id: forward-auth-app
        identifiers:
          slug: forward-auth-domain
        attrs:
          name: Homelab SSO
          provider: !KeyOf forward-auth-provider
          meta_launch_url: https://auth.item.fyi

      # totp setup stage
      - model: authentik_stages_authenticator_totp.authenticatortotpstage
        id: totp-setup-stage
        identifiers:
          name: totp-setup
        attrs:
          digits: 6
          friendly_name: Authenticator App (TOTP)

      # webauthn setup stage (hardware keys, passkeys)
      - model: authentik_stages_authenticator_webauthn.authenticatorwebauthnstage
        id: webauthn-setup-stage
        identifiers:
          name: webauthn-setup
        attrs:
          friendly_name: Security Key / Passkey

      # enforce mfa on the default authentication flow
      - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
        identifiers:
          name: default-authentication-mfa-validation
        attrs:
          not_configured_action: configure
          device_classes:
            - totp
            - webauthn
          configuration_stages:
            - !KeyOf totp-setup-stage
            - !KeyOf webauthn-setup-stage

      # bind the application to the embedded outpost
      - model: authentik_outposts.outpost
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          type: proxy
          config:
            authentik_host: https://auth.item.fyi
          providers:
            - !KeyOf forward-auth-provider

  grafana-oauth2.yaml: |
    version: 1
    metadata:
      name: grafana oauth2 provider
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: grafana-provider
        identifiers:
          name: Grafana
        attrs:
          client_id: grafana
          client_secret: ${SECRET_AUTHENTIK_GRAFANA_CLIENT_SECRET}
          client_type: confidential
          redirect_uris:
            - url: https://grafana.item.fyi/login/generic_oauth
              matching_mode: strict
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      - model: authentik_core.application
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !KeyOf grafana-provider
          meta_launch_url: https://grafana.item.fyi


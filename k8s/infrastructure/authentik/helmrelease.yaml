apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2026.2.2" # https://artifacthub.io/packages/helm/goauthentik/authentik
      sourceRef:
        kind: HelmRepository
        name: authentik
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: authentik
      valuesKey: AUTHENTIK_SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik
      valuesKey: AUTHENTIK_POSTGRESQL_PASSWORD
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik
      valuesKey: AUTHENTIK_POSTGRESQL_PASSWORD
      targetPath: postgresql.auth.password
    - kind: Secret
      name: authentik
      valuesKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      targetPath: authentik.bootstrap.password
  values:
    authentik:
      bootstrap:
        email: ""
    server:
      podAnnotations:
        configmap.reloader.stakater.com/reload: authentik-blueprints
        secret.reloader.stakater.com/reload: authentik-blueprints-secret
      ingress:
        enabled: false # using IngressRoute instead
    worker:
      podAnnotations:
        configmap.reloader.stakater.com/reload: authentik-blueprints
        secret.reloader.stakater.com/reload: authentik-blueprints-secret
    postgresql:
      enabled: true
      primary:
        persistence:
          storageClass: nfs-zfs
    redis:
      enabled: true
      master:
        persistence:
          storageClass: nfs-zfs
    blueprints:
      configMaps:
        - authentik-blueprints
      secrets:
        - authentik-blueprints-secret

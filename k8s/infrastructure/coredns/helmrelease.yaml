apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: coredns
      version: "1.38.0" # https://github.com/coredns/helm/releases
      sourceRef:
        kind: HelmRepository
        name: coredns
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    isClusterService: true
    service:
      name: kube-dns
      clusterIP: "10.43.0.10"
    serviceAccount:
      create: true
      name: coredns
    rbac:
      create: true
    servers:
      - zones:
          - zone: .
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |
              lameduck 5s
          - name: ready
          - name: kubernetes
            parameters: cluster.local in-addr.arpa ip6.arpa
            configBlock: |
              pods insecure
              fallthrough in-addr.arpa ip6.arpa
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: forward
            parameters: . /etc/resolv.conf
          - name: cache
            parameters: 30
          - name: loop
          - name: reload
          - name: loadbalance
    prometheus:
      service:
        enabled: true
      monitor:
        enabled: true

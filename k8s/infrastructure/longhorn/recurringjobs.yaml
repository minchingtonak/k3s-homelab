apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-policy
  namespace: longhorn-system
data:
  recurring-job-group.yaml: |
    apiVersion: longhorn.io/v1beta1
    kind: RecurringJob
    metadata:
      name: backup-daily
    spec:
      cron: "0 2 * * *"
      task: backup
      groups:
      - production
      retain: 14
      concurrency: 2
    ---
    apiVersion: longhorn.io/v1beta1
    kind: RecurringJob
    metadata:
      name: backup-weekly
    spec:
      cron: "0 3 * * 0"
      task: backup
      groups:
      - production
      retain: 8
      concurrency: 1
    ---
    apiVersion: longhorn.io/v1beta1
    kind: RecurringJob
    metadata:
      name: snapshot-hourly
    spec:
      cron: "0 * * * *"
      task: snapshot
      groups:
      - production
      retain: 24
      concurrency: 3

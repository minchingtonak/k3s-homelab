apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Grafana"
    gethomepage.dev/description: "Monitoring dashboards"
    gethomepage.dev/group: "Monitoring"
    gethomepage.dev/icon: "grafana.png"
    gethomepage.dev/href: "https://grafana.item.fyi"
    gethomepage.dev/siteMonitor: "https://grafana.item.fyi"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
    gethomepage.dev/widget.type: "grafana"
    gethomepage.dev/widget.url: "http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local"
    gethomepage.dev/widget.username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
    gethomepage.dev/widget.password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.item.fyi`)
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls: {}

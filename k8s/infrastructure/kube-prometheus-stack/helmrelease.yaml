apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.4.0" # https://github.com/prometheus-community/helm-charts/releases
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
  values:
    # -------------------------------------------------------
    # K3s-specific: disable scrapers for components that do not
    # have separate endpoints in k3s. K3s merges apiserver,
    # controller-manager, scheduler, proxy, and etcd metrics
    # into the kubelet endpoint on each node.
    # -------------------------------------------------------
    kubeApiServer:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false

    # kubelet scraping stays enabled — this is where k3s exposes
    # all merged control-plane and node metrics
    kubelet:
      enabled: true

    # -------------------------------------------------------
    # Default dashboards and alert rules
    # -------------------------------------------------------
    # Dashboards: keep enabled. Some (apiserver, etcd, scheduler)
    # will show empty panels, but kubelet, node, pod, and workload
    # dashboards are immediately useful.
    defaultDashboardsEnabled: true

    defaultRules:
      create: true
      rules:
        # Disable rule groups for components we don't scrape
        etcd: false
        kubeApiserver: false
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false

    # -------------------------------------------------------
    # Grafana
    # -------------------------------------------------------
    grafana:
      ingress:
        enabled: false  # exposed via IngressRoute instead
      initChownData:
        enabled: false  # provisioner creates 777 dirs; chown is unnecessary and fails on NFS with existing data
      persistence:
        enabled: true
        size: 2Gi
        storageClassName: nfs-zfs
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      # -------------------------------------------------------
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false

      # Community dashboards — fetched from grafana.com at startup
      # To find revision: https://grafana.com/api/dashboards/<id>
      # -------------------------------------------------------
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: community
              orgId: 1
              folder: Community
              type: file
              disableDeletion: true
              editable: false
              options:
                path: /var/lib/grafana/dashboards/community
      dashboards:
        community:
          node-exporter-full:
            gnetId: 1860      # https://grafana.com/grafana/dashboards/1860
            revision: 45
            datasource: Prometheus
          traefik:
            gnetId: 17346     # https://grafana.com/grafana/dashboards/17346
            revision: 9
            datasource: Prometheus
          loki-kubernetes-logs:
            gnetId: 16976     # https://grafana.com/grafana/dashboards/16976
            revision: 7
            datasource: Loki
          loki-volume:
            gnetId: 23789     # https://grafana.com/grafana/dashboards/23789
            revision: 1
            datasource: Loki
          zfs-nas:
            gnetId: 19580     # https://grafana.com/grafana/dashboards/19580
            revision: 10
            datasource: Prometheus

    # -------------------------------------------------------
    # Prometheus
    # -------------------------------------------------------
    prometheus:
      prometheusSpec:
        # Discover all ServiceMonitors/PodMonitors in the cluster, not just
        # those labelled release: kube-prometheus-stack
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        retention: 90d
        retentionSize: 45GB
        externalUrl: https://prometheus.item.fyi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: nfs-zfs
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        resources:
          requests:
            cpu: 250m
            memory: 768Mi
          limits:
            memory: 2500Mi
        # Scrape the Proxmox host's node-exporter for ZFS pool metrics.
        # Requires node-exporter running on 192.168.8.89 with --collector.zfs.
        # See: docs/zfs-metrics-setup.md for installation instructions.
        additionalScrapeConfigs:
          - job_name: proxmox-host
            static_configs:
              - targets:
                  - '192.168.8.89:9100'
                labels:
                  instance: proxmox-host
                  job: node

    # -------------------------------------------------------
    # Alertmanager
    # -------------------------------------------------------
    alertmanager:
      enabled: true
      alertmanagerSpec:
        # Mount the Pushover credentials secret into the Alertmanager pod.
        # The sealed-secrets controller decrypts alertmanager-pushover-credentials
        # and makes it available at:
        #   /etc/alertmanager/secrets/alertmanager-pushover-credentials/{userKey,token}
        externalUrl: https://alertmanager.item.fyi
        secrets:
          - alertmanager-pushover-credentials
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname', 'namespace']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: pushover
          routes:
            # Watchdog is a synthetic heartbeat alert — always firing, always suppressed
            - receiver: 'null'
              matchers:
                - alertname = Watchdog
            # InfoInhibitor is a meta-alert used to silence info-level alerts
            - receiver: 'null'
              matchers:
                - alertname = InfoInhibitor
        receivers:
          - name: 'null'
          - name: pushover
            pushover_configs:
              - user_key_file: /etc/alertmanager/secrets/alertmanager-pushover-credentials/userKey
                token_file: /etc/alertmanager/secrets/alertmanager-pushover-credentials/token
                title: >-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
                  {{ .CommonLabels.alertname }}
                message: |-
                  {{ range .Alerts }}{{ .Annotations.summary }}
                  {{ .Annotations.description }}
                  {{ end }}
                # priority: -1 = quiet (resolved), 0 = normal (warning), 1 = high (critical)
                priority: >-
                  {{ if eq .Status "resolved" }}-1{{ else if eq .CommonLabels.severity "critical" }}1{{ else }}0{{ end }}
                send_resolved: true

    # -------------------------------------------------------
    # Node exporter and kube-state-metrics
    # -------------------------------------------------------
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true


name: k3s-homelab
description: A minimal Kubernetes TypeScript Pulumi program
runtime:
  name: nodejs
  options:
    packagemanager: pnpm
config:
  pulumi:tags:
    value:
      pulumi:template: typescript
packages:
  flux:
    source: terraform-provider
    version: 0.12.0
    parameters:
      - fluxcd/flux
  helm:
    source: terraform-provider
    version: 0.12.0
    parameters:
      - hashicorp/helm
